<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="index.html">← Back</a>

<div class="product-page">

  <div class="product-info">
    <h1>Custom Wallet</h1>
    <p>$59</p>
    <p>Design your own wallet below.</p>
  </div>

  <div class="product-images">

    <img id="mainImage" src="wallet1.jpg" width="300">

    <div class="thumbnails">
      <img src="wallet1.jpg" onclick="switchImage('wallet1.jpg')">
      <img src="wallet2.jpg" onclick="switchImage('wallet2.jpg')">
      <img src="wallet3.jpg" onclick="switchImage('wallet3.jpg')">
    </div>

    <canvas id="drawingCanvas" width="300" height="300"></canvas>

  </div>

</div>

<script>
const canvas = document.getElementById("drawingCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e) {
  if (!drawing) return;
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(e.offsetX, e.offsetY, 2, 0, Math.PI * 2);
  ctx.fill();
}

function switchImage(src) {
  document.getElementById("mainImage").src = src;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
