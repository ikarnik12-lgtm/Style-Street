<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Style Street</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Style Street</h1>
    <p>Custom Leather Wallets, Jackets & Hats</p>
  </header>

  <section class="products">

    <div class="product">
      <h2>Leather Wallet</h2>
      <p>$49</p>
      <button onclick="addToCart('Wallet')">Add to Cart</button>
    </div>

    <div class="product">
      <h2>Leather Jacket</h2>
      <p>$199</p>
      <button onclick="addToCart('Jacket')">Add to Cart</button>
    </div>

    <div class="product">
      <h2>Custom Hat</h2>
      <p>$29</p>
      <button onclick="addToCart('Hat')">Add to Cart</button>
    </div>

  </section>

  <section class="cart">
    <h2>Cart</h2>
    <ul id="cart-list"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
